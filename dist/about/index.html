ot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;el.kulo という名で活動している A.Sudo です。&lt;/p&gt;\n&lt;p&gt;東京の某企業でフロント・エンド・エンジニアを務めています。デザイナーでもあります。&lt;/p&gt;\n&lt;p&gt;WordPress をベースにした制作を得意とし、企業向けにオリジナルのテーマやプラグインをゼロから作り管理しています。\nデザインからシステム構築まで一貫したサイト制作をします。&lt;/p&gt;\n&lt;p&gt;また、ポスターやフライヤーなどの印刷媒体の広告デザインも行います。&lt;/p&gt;\n&lt;p&gt;もとはデザイン系の学校出身で、写真を駆使した Photoshop でのコラージュを得意とします。&lt;/p&gt;\n&lt;p&gt;写真や映像、音楽などクリエイトすることにジャンルを問わず興味を持っています。&lt;/p&gt;\n&lt;p&gt;デザインをメインに据えたいところですが、HTML, CSS, JavaScript, PHP の実務歴は 18 年以上となり、修得レベルは比較的高いほうです。&lt;/p&gt;\n&lt;h2 id=\&quot;スキル\&quot;&gt;スキル&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;主要言語&lt;/strong&gt;&lt;br&gt;\nHTML, Sass(SCSS), TypeScript, JavaScript, PHP&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;主要ライブラリ&lt;/strong&gt;&lt;br&gt;\nReact, Gatsby, Vue(v3), Express, WordPress, Slim Framework, Laravel, 他&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;個人制作\&quot;&gt;個人制作&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Portfolio&lt;/strong&gt;&lt;br&gt;\n&lt;a href=\&quot;https://elkulo.github.io/\&quot;&gt;https://elkulo.github.io/&lt;/a&gt;&lt;br&gt;\nJAMstack な React x Gatsby のポートフォリオ&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Mailer&lt;/strong&gt;&lt;br&gt;\n&lt;a href=\&quot;https://mailer.elkulo.me/\&quot;&gt;https://mailer.elkulo.me/&lt;/a&gt;&lt;br&gt;\nWordPress にも組み込めるモダンでシンプルな Slim Framework のメールフォーム&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Feeder&lt;/strong&gt;&lt;br&gt;\n&lt;a href=\&quot;https://feeder.elkulo.me/\&quot;&gt;https://feeder.elkulo.me/&lt;/a&gt;&lt;br&gt;\nWordPress の更新状況を一元監視する Vue x Slim Framework の RSS リーダー&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;API Server&lt;/strong&gt;&lt;br&gt;\n&lt;a href=\&quot;https://api.elkulo.me/\&quot;&gt;https://api.elkulo.me/&lt;/a&gt;&lt;br&gt;\nJAMstack 用に作った Slim Framework の API サーバー&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h3 id=\&quot;開発環境\&quot;&gt;開発環境&lt;/h3&gt;\n&lt;p&gt;MacBook Pro (US Keyboard)&lt;br&gt;\niPad mini + Apple Pencil&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;■ デザイン&lt;/strong&gt;&lt;br&gt;\nAdobe illustrator / Adobe Photoshop / Adobe XD&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;■ コードエディッター&lt;/strong&gt;&lt;br&gt;\nVSCode / Panic Nova&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;■ 動画&amp;#x26;音楽&lt;/strong&gt;&lt;br&gt;\nApple Final Cut Pro / Apple GarageBand&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;■ SFTP&lt;/strong&gt;&lt;br&gt;\nPanic Transmit&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3 id=\&quot;github\&quot;&gt;Github&lt;/h3&gt;\n&lt;p&gt;個人制作のコードは Github で公開しています。評価するには私の書いたコードを見てください。&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https://github.com/elkulo\&quot;&gt;https://github.com/elkulo&lt;/a&gt;&lt;/p&gt;&quot;]}],&quot;postContent&quot;:[0,{&quot;title&quot;:[0,&quot;ABOUT&quot;],&quot;description&quot;:[0,&quot;A.Sudo&quot;],&quot;date&quot;:[0,&quot;2023.10.14&quot;],&quot;attachedSrc&quot;:[0,&quot;/elkulo.github.io/content/about/profile.jpg&quot;]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;AboutPage&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>  </div> <script type="module" src="/elkulo.github.io/_astro/Layout.astro_astro_type_script_index_0_lang.BLCUvuSt.js"></script> </body> </html>
